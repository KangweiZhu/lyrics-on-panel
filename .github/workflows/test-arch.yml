name: Test Arch Linux Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - '.github/workflows/test-arch.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  test-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm base-devel cmake dbus git rust

      - name: Checkout
        uses: actions/checkout@v4

      - name: Check formatting
        working-directory: backend
        run: cargo fmt --check

      - name: Run tests
        working-directory: backend
        run: cargo test --locked

      - name: Run Clippy
        working-directory: backend
        run: cargo clippy --locked -- -D warnings

      - name: Build release backend
        working-directory: backend
        run: cargo build --release --locked

      - name: Smoke test release backend
        working-directory: backend
        run: |
          dbus-run-session -- bash -euo pipefail -c '
            ./target/release/lyrics-on-panel-backend &
            backend_pid=$!
            trap "kill $backend_pid 2>/dev/null || true; wait $backend_pid 2>/dev/null || true" EXIT
            sleep 2
            kill -0 "$backend_pid"
          '
